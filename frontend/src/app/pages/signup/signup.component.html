<div class="auth-shell">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Cadastrar Jogador</mat-card-title>
      <mat-card-subtitle>Cadastro sujeito à aprovação de um ADM</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
        <mat-form-field appearance="outline">
          <mat-label>Nome</mat-label>
          <input matInput formControlName="name" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Sobrenome</mat-label>
          <input matInput formControlName="lastName" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Username</mat-label>
          <input matInput formControlName="username" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Senha</mat-label>
          <input matInput formControlName="password" type="password" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Confirmar senha</mat-label>
          <input matInput formControlName="confirmPassword" type="password" />
        </mat-form-field>

        @if (form.errors?.['passwordMismatch']) {
          <p class="error">As senhas não conferem.</p>
        }

        <button mat-flat-button color="primary" type="submit" [disabled]="loading">
          <mat-icon>person_add</mat-icon>
          Criar conta
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions>
      <a mat-button routerLink="/login">Já tenho conta</a>
    </mat-card-actions>
  </mat-card>
</div>
